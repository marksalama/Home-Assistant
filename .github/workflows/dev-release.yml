name: Dev channel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compute dev version
        id: version
        run: |
          BASE=$(python - <<'PY'
          import tomllib
          data = tomllib.load(open("pyproject.toml", "rb"))
          print(data["project"]["version"])
          PY
          )
          echo "version=${BASE}.dev${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Patch package version for artifact
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          path = Path("pyproject.toml")
          text = path.read_text()
          version = os.environ["DEV_VERSION"]
          text = text.replace('version = "0.3.0"', f'version = "{version}"')
          path.write_text(text)
          PY
        env:
          DEV_VERSION: ${{ steps.version.outputs.version }}

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: home-assistant-mcp-${{ steps.version.outputs.version }}
          path: dist/*

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.run_number }}
          name: Home Assistant MCP ${{ steps.version.outputs.version }}
          prerelease: true
          files: dist/*
