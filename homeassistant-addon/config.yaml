name: Home Assistant MCP Server
version: 0.3.0
slug: ha_mcp
description: MCP server for Home Assistant configuration, control, debugging, and Claude Link.
url: https://github.com/marksalama/Home-Assistant
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
homeassistant_api: true
host_network: false
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: MCP Streamable HTTP endpoint
map:
  - type: homeassistant_config
    read_only: false
    path: /config
options:
  port: 8765
  http_token: ""
  read_only: false
  auto_backup_before_update: true
  enable_tool_search: false
  pinned_tools: "get_overview,fuzzy_search,get_state,call_service"
  builtin_mcp_url: ""
schema:
  port: "int(1024,65535)"
  http_token: "password?"
  read_only: bool
  auto_backup_before_update: bool
  enable_tool_search: bool
  pinned_tools: str
  builtin_mcp_url: "url?"
